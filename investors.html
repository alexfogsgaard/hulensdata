<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Investorer — Hulens Data</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/layout.js"></script>
</head>
<body>

<header class="site-header"></header>
<script>renderSiteHeader('investors');</script>

<main class="page-main">

  <!-- Grid view -->
  <div id="grid-view">
    <h1 class="page-title">Investorer <span>·</span> klik for profil</h1>
    <div id="investor-grid"></div>
  </div>

  <!-- Detail view -->
  <div id="detail-view" style="display:none">
    <a class="back-btn" href="#" id="back-btn">← Alle investorer</a>
    <div id="detail-body"></div>
  </div>

</main>

<script src="js/helpers.js"></script>
<script src="js/supabase.js"></script>
<script src="js/components.js"></script>
<script>
let allDeals = [];

function getInvestorDeals(name) {
  return allDeals.filter(d => d.investorList.some(inv => inv === name));
}

function renderGrid() {
  // Status (aktiv/gæst/tidligere) udledes af deals-data — se buildInvestorIndex i helpers.js.
  // Kort-markup ejes af renderInvestorCard() i components.js; denne funktion er kun komposition.
  const { investors, latestSeason } = buildInvestorIndex(allDeals);
  const byDeals = (a, b) => b.deals - a.deals;

  const groups = [
    { title: '<span>🦁</span> Aktive løver', items: investors.filter(m => m.status === 'aktiv').sort(byDeals), muted: false },
    { title: 'Gæsteløver',                   items: investors.filter(m => m.status === 'gaest').sort(byDeals), muted: true },
    { title: 'Tidligere løver',              items: investors.filter(m => m.status === 'tidligere').sort(byDeals), muted: true },
  ];

  document.getElementById('investor-grid').innerHTML = groups
    .filter(g => g.items.length > 0)
    .map(g => `
      <div class="investor-section-header"${g.muted ? ' style="color:var(--muted);margin-top:36px"' : ''}>
        ${g.title} <span class="inv-section-count"${g.muted ? ' style="background:var(--surface2);border-color:var(--border);color:var(--muted)"' : ''}>${g.items.length}</span>
      </div>
      <div class="investor-subgrid">${g.items.map(m => renderInvestorCard(m, latestSeason)).join('')}</div>
    `).join('');
}

// Ét delegeret klik i stedet for onclick pr. kort; Enter åbner også profilen (kortene er fokusérbare)
document.getElementById('investor-grid').addEventListener('click', e => {
  const card = e.target.closest('.investor-card');
  if (card) showDetail(card.dataset.name);
});
document.getElementById('investor-grid').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const card = e.target.closest('.investor-card');
  if (card) showDetail(card.dataset.name);
});

function showDetail(name, push = true) {
  const deals = getInvestorDeals(name);
  if (deals.length === 0) { showGrid(push); return; }
  const totalReceived = deals.reduce((s, d) => s + (d.received || 0), 0);
  const avgShare = avg(deals.map(d => d.shareSold));
  const seasons = [...new Set(deals.map(d => d.season))].sort((a, b) => a - b);

  document.getElementById('grid-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';

  const body = document.getElementById('detail-body');
  body.innerHTML = `
    <h1 style="font-family:'Playfair Display',serif;font-size:clamp(2rem,4vw,3rem);font-weight:900;letter-spacing:-1px;margin-bottom:4px">${esc(name)}</h1>
    <p style="font-size:0.8rem;color:var(--muted);margin-bottom:28px">Sæson ${seasons.join(', ')} · ${deals.length} deals</p>

    <div class="kpi-row">
      <div class="kpi-card"><div class="kpi-label">Antal deals</div><div class="kpi-val">${deals.length}</div></div>
      <div class="kpi-card"><div class="kpi-label">Samlet investeret</div><div class="kpi-val" style="font-size:1.2rem">kr ${(totalReceived/1000000).toFixed(1)}M</div></div>
      <div class="kpi-card"><div class="kpi-label">Gns. andel solgt</div><div class="kpi-val">${avgShare ? avgShare.toFixed(1)+'%' : '—'}</div></div>
      <div class="kpi-card"><div class="kpi-label">Sæsoner aktiv</div><div class="kpi-val">${seasons.length}</div></div>
    </div>

    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Virksomhed</th>
            <th>Sæson</th>
            <th>Søgte</th>
            <th>Modtaget</th>
            <th>Solgt andel</th>
            <th>Val. før</th>
            <th>Val. efter</th>
          </tr>
        </thead>
        <tbody>
          ${deals.map(d => `
            <tr>
              <td style="font-weight:500">${esc(d.name)}</td>
              <td><span class="season-badge">S${d.season}E${d.episode}</span></td>
              <td>${fmt(d.asked)}</td>
              <td>${fmt(d.received)}</td>
              <td>${pct(d.shareSold)}</td>
              <td>${fmt(d.valBefore)}</td>
              <td>${fmt(d.valAfter)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;

  if (push) window.history.pushState({}, '', '?name=' + encodeURIComponent(name));
}

function showGrid(push = true) {
  document.getElementById('grid-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  if (push) window.history.pushState({}, '', 'investors.html');
}

// Tilbage/frem-knapper: vis den visning URL'en peger på, uden at skubbe ny historik
window.addEventListener('popstate', () => {
  const name = new URLSearchParams(window.location.search).get('name');
  if (name) showDetail(name, false);
  else showGrid(false);
});

document.getElementById('back-btn').addEventListener('click', e => {
  e.preventDefault();
  showGrid();
});

async function init() {
  allDeals = await loadDeals();
  renderHeaderStats(allDeals);
  renderGrid();

  // Åbn direkte hvis URL har ?name= (delbare investorprofiler)
  const params = new URLSearchParams(window.location.search);
  if (params.get('name')) {
    showDetail(params.get('name'), false);
  }
}

init().catch(err => { console.error(err); showLoadError(); });
</script>
</body>
</html>
