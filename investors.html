<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta name="description" content="Se investorer fra Løvens Hule, deres panelperioder, TV-aftaler, medinvestorer og porteføljer.">
<link rel="canonical" href="https://hulensdata.dk/investors.html">
<meta property="og:type" content="website"><meta property="og:site_name" content="Hulens Data"><meta property="og:locale" content="da_DK">
<meta property="og:title" content="Investorer i Løvens Hule — Hulens Data"><meta property="og:description" content="Panelperioder, registrerede TV-aftaler, medinvestorer og porteføljer."><meta property="og:url" content="https://hulensdata.dk/investors.html">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Archivo:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<script src="js/layout.js"></script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"CollectionPage","name":"Investorer i Løvens Hule","url":"https://hulensdata.dk/investors.html","description":"Panelperioder, registrerede TV-aftaler, medinvestorer og porteføljer."}</script>
</head>
<body>

<a class="skip-link" href="#main-content">Spring til indhold</a>
<header class="site-header"></header>
<script>renderSiteHeader('investors');</script>

<main id="main-content" class="page-main">

  <!-- Grid view -->
  <div id="grid-view">
    <header class="index-header"><p class="section-kicker">Investorregister</p><h1 class="page-title">Investorer i Løvens Hule</h1><p>Porteføljer, panelperioder, medinvestorer og registrerede TV-aftaler.</p></header>
    <div id="investor-grid" class="investor-groups"></div>
  </div>

  <!-- Detail view -->
  <div id="detail-view" style="display:none">
    <a class="back-btn" href="#" id="back-btn">← Alle investorer</a>
    <div id="detail-body"></div>
  </div>

</main>
<footer class="site-footer"><span>Hulens Data · uofficielt dataarkiv</span><a href="/#metode">Metode og kilder</a></footer>

<script src="js/helpers.js"></script>
<script src="js/supabase.js"></script>
<script src="js/components.js"></script>
<script>
let allDeals = [];

function getInvestorDeals(name) {
  return allDeals.filter(d => d.investorList.some(inv => inv === name));
}

function renderGrid() {
  // Status (aktiv/gæst/tidligere) udledes af deals-data — se buildInvestorIndex i helpers.js.
  // Kort-markup ejes af renderInvestorCard() i components.js; denne funktion er kun komposition.
  const { investors, latestSeason } = buildInvestorIndex(allDeals);
  const byDeals = (a, b) => b.deals - a.deals;

  const groups = [
    { title: 'Aktive løver',    items: investors.filter(m => m.status === 'aktiv').sort(byDeals) },
    { title: 'Gæsteløver',      items: investors.filter(m => m.status === 'gaest').sort(byDeals) },
    { title: 'Tidligere løver', items: investors.filter(m => m.status === 'tidligere').sort(byDeals) },
  ];

  document.getElementById('investor-grid').innerHTML = groups
    .filter(g => g.items.length > 0)
    .map(g => `
      <section class="entity-group">
        <h2 class="entity-index-letter"><span>${g.title}</span><small class="num">${g.items.length}</small></h2>
        <div class="entity-list">${g.items.map(m => renderInvestorCard(m, latestSeason)).join('')}</div>
      </section>
    `).join('');
}

// Registerkortene er ægte links (<a>) — ingen delegation nødvendig.

function showDetail(name, push = true) {
  // Profilen er et mini-dashboard — markup ejes af renderInvestorProfile() i components.js
  const { investors, latestSeason } = buildInvestorIndex(allDeals);
  const m = investors.find(x => x.name === name);
  if (!m) { showGrid(push); return; }

  document.getElementById('grid-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';

  const profile = buildInvestorProfile(m, allDeals);
  document.getElementById('detail-body').innerHTML = renderInvestorProfile(profile, latestSeason);
  window.scrollTo({ top: 0, behavior: 'instant' });

  if (push) window.history.pushState({}, '', '?name=' + encodeURIComponent(name));
}

function showGrid(push = true) {
  document.getElementById('grid-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  if (push) window.history.pushState({}, '', 'investors.html');
}

// Tilbage/frem-knapper: vis den visning URL'en peger på, uden at skubbe ny historik
window.addEventListener('popstate', () => {
  const name = new URLSearchParams(window.location.search).get('name');
  if (name) showDetail(name, false);
  else showGrid(false);
});

document.getElementById('back-btn').addEventListener('click', e => {
  e.preventDefault();
  showGrid();
});

async function init() {
  document.getElementById('investor-grid').innerHTML =
    '<div class="investor-subgrid">' + renderSkeletonCards(8) + '</div>';
  allDeals = await loadDeals();
  renderHeaderStats(allDeals);
  renderGrid();

  // Legacy-links (?name=) omdirigeres til det trykte bind
  const params = new URLSearchParams(window.location.search);
  const navn = params.get('name');
  if (navn && INVESTOR_STATUS[navn] && INVESTOR_STATUS[navn].slug) {
    window.location.replace(investorUrl(navn));
    return;
  }
  if (navn) showDetail(navn, false); // fallback: ukendt navn uden bind
}

init().catch(err => { console.error(err); showLoadError(); });
</script>
</body>
</html>
