<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virksomheder fra Løvens Hule — Hulens Data</title>
<meta name="description" content="Søg og filtrér virksomheder fra Løvens Hule. Se pitch, TV-aftale, dokumenteret efterliv, CVR og kilder.">
<link rel="canonical" href="https://hulensdata.dk/companies.html">
<meta property="og:type" content="website"><meta property="og:site_name" content="Hulens Data"><meta property="og:locale" content="da_DK">
<meta property="og:title" content="Virksomheder fra Løvens Hule — Hulens Data"><meta property="og:description" content="Søg virksomheder og se TV-aftaler, CVR, dokumenteret efterliv og kilder."><meta property="og:url" content="https://hulensdata.dk/companies.html">
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,900&family=Archivo:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/layout.js"></script>
<script type="application/ld+json">{"@context":"https://schema.org","@type":"CollectionPage","name":"Virksomheder fra Løvens Hule","url":"https://hulensdata.dk/companies.html","description":"Søgbar oversigt over virksomheder, TV-aftaler, CVR og dokumenteret efterliv."}</script>
</head>
<body>

<a class="skip-link" href="#main-content">Spring til indhold</a>
<header class="site-header"></header>
<script>renderSiteHeader('companies');</script>

<main id="main-content" class="page-main">

  <!-- Grid view -->
  <div id="grid-view">
    <header class="index-header">
      <p class="section-kicker">Virksomhedsregister</p>
      <h1 class="page-title">Virksomheder fra Løvens Hule</h1>
      <p>Find en virksomhed og se identitet, pitch, TV-aftale, dokumenterede efterlivshændelser og kilder. Manglende oplysninger vises som ikke dokumenteret.</p>
    </header>
    <nav class="alphabet-nav" id="ryttere" aria-label="Spring til bogstav"></nav>

    <div class="filters" aria-label="Filtrér virksomheder">
      <label><span>Sæson</span><select id="filter-season"><option value="">Alle sæsoner</option></select></label>
      <label><span>Status</span><select id="filter-status"><option value="">Alle statusser</option><option value="aktiv">Aktiv</option><option value="inaktiv">Inaktiv</option><option value="ukendt">Ukendt</option></select></label>
      <label><span>Kategori</span><select id="filter-category"><option value="">Alle kategorier</option></select></label>
      <label class="filter-search"><span>Navn</span><input type="search" id="filter-search" placeholder="Søg virksomhed…" autocomplete="off" aria-controls="co-grid"></label>
    </div>

    <div class="entity-list" id="co-grid"></div>
    <p class="table-count" id="co-count" aria-live="polite"></p>
  </div>

  <!-- Detail view -->
  <div id="detail-view" style="display:none">
    <a class="back-btn" href="#" id="back-btn">← Alle virksomheder</a>
    <div id="detail-body"></div>
  </div>

</main>
<footer class="site-footer"><span>Hulens Data · uofficielt dataarkiv</span><a href="/metode/">Metode og datadækning</a></footer>

<script src="js/helpers.js"></script>
<script src="js/supabase.js"></script>
<script src="js/components.js"></script>
<script>
let allDeals = [];

function populateFilters() {
  const seasons = [...new Set(allDeals.map(d => d.season))].sort((a,b) => a-b);
  const sel = document.getElementById('filter-season');
  seasons.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = 'Sæson ' + s;
    sel.appendChild(opt);
  });
  const categories = [...new Set(allDeals.map(d => d.category).filter(Boolean))].sort((a, b) => a.localeCompare(b, 'da'));
  const categorySelect = document.getElementById('filter-category');
  categories.forEach(category => {
    const opt = document.createElement('option');
    opt.value = category;
    opt.textContent = category;
    categorySelect.appendChild(opt);
  });
}

function getFilteredCompanies() {
  const season = document.getElementById('filter-season').value;
  const status = document.getElementById('filter-status').value;
  const category = document.getElementById('filter-category').value;
  const search = document.getElementById('filter-search').value.toLowerCase();

  const byName = {};
  allDeals.forEach(d => {
    if (!byName[d.name]) byName[d.name] = [];
    byName[d.name].push(d);
  });

  return Object.entries(byName).filter(([name, deals]) => {
    if (season && !deals.some(d => d.season == season)) return false;
    if (status && !deals.some(d => (d.status || '').toLowerCase() === status)) return false;
    if (category && !deals.some(d => d.category === category)) return false;
    if (search && !name.toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderGrid() {
  const companies = getFilteredCompanies()
    .sort((a, b) => a[0].localeCompare(b[0], 'da'));
  const grupper = new Map();
  companies.forEach(([name, deals]) => {
    const bogstav = /^[0-9]/.test(name) ? '0–9' : name[0].toUpperCase();
    if (!grupper.has(bogstav)) grupper.set(bogstav, []);
    grupper.get(bogstav).push([name, deals]);
  });
  document.getElementById('co-grid').innerHTML = [...grupper.entries()].map(([b, liste]) =>
    `<h2 class="entity-index-letter" id="fane-${encodeURIComponent(b)}"><span>${b}</span><small class="num">${liste.length}</small></h2>` +
    liste.map(([name, deals]) => renderCompanyCard(name, deals)).join('')
  ).join('');
  document.getElementById('ryttere').innerHTML = [...grupper.keys()].map(b =>
    `<a href="#fane-${encodeURIComponent(b)}">${b}</a>`).join('');
  const total = new Set(allDeals.map(deal => deal.name)).size;
  document.getElementById('co-count').textContent = `Viser ${companies.length} af ${total} virksomheder`;
}

// Event-wiring — ingen inline handlers i markup
document.getElementById('filter-season').addEventListener('change', renderGrid);
document.getElementById('filter-status').addEventListener('change', renderGrid);
document.getElementById('filter-category').addEventListener('change', renderGrid);
document.getElementById('filter-search').addEventListener('input', renderGrid);

// Registerkortene er ægte links (<a>) — ingen delegation nødvendig.

document.getElementById('back-btn').addEventListener('click', e => {
  e.preventDefault();
  showGrid();
});

function showDetail(name, push = true) {
  // Profilen er et mini-dashboard — markup ejes af renderCompanyProfile() i components.js
  const p = buildCompanyProfile(name, allDeals);
  if (!p) { showGrid(push); return; }

  document.getElementById('grid-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-body').innerHTML = renderCompanyProfile(p);
  window.scrollTo({ top: 0, behavior: 'instant' });

  if (push) window.history.pushState({}, '', '?co=' + encodeURIComponent(COMPANY_SLUGS[name] || name));
}

function showGrid(push = true) {
  document.getElementById('grid-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  if (push) window.history.pushState({}, '', 'companies.html');
}

// Slug (?co=) er URL-nøglen; ?name= accepteres som legacy fra gamle delte links
function companyFromUrl() {
  const params = new URLSearchParams(window.location.search);
  const slug = params.get('co');
  if (slug) return COMPANY_NAMES[slug] || null;
  return params.get('name');
}

// Tilbage/frem-knapper: vis den visning URL'en peger på, uden at skubbe ny historik
window.addEventListener('popstate', () => {
  const name = companyFromUrl();
  if (name) showDetail(name, false);
  else showGrid(false);
});

async function init() {
  document.getElementById('co-grid').innerHTML = renderSkeletonCards(12);
  // Arkivlaget (efterliv + kilder) hentes parallelt; fejler blødt uden profil-tab
  const [deals] = await Promise.all([loadDeals(), loadCompanyArchive()]);
  allDeals = deals;
  renderHeaderStats(allDeals);
  populateFilters();
  renderGrid();

  // Legacy-links (?co=slug / ?name=) omdirigeres til det trykte bind —
  // den statiske side er den kanoniske profil.
  const name = companyFromUrl();
  if (name && COMPANY_SLUGS[name]) {
    window.location.replace(companyUrl(name));
    return;
  }
  if (name) showDetail(name, false); // fallback: ukendt slug/navn uden bind
}

init().catch(err => { console.error(err); showLoadError(); });
</script>
</body>
</html>
