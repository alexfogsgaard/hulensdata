<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Virksomheder — Hulens Data</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/layout.js"></script>
</head>
<body>

<header class="site-header"></header>
<script>renderSiteHeader('companies');</script>

<main class="page-main">

  <!-- Grid view -->
  <div id="grid-view">
    <h1 class="page-title">Virksomheder <span>·</span> alle sæsoner</h1>

    <div class="filters">
      <label>Sæson</label>
      <select id="filter-season">
        <option value="">Alle</option>
      </select>
      <label>Status</label>
      <select id="filter-status">
        <option value="">Alle</option>
        <option value="Aktiv">Aktiv</option>
        <option value="Inaktiv">Inaktiv</option>
        <option value="Ukendt">Ukendt</option>
      </select>
      <input type="text" id="filter-search" placeholder="Søg virksomhed…" style="min-width:160px">
    </div>

    <div class="co-grid" id="co-grid"></div>
    <p class="table-count" id="co-count"></p>
  </div>

  <!-- Detail view -->
  <div id="detail-view" style="display:none">
    <a class="back-btn" href="#" id="back-btn">← Alle virksomheder</a>
    <div id="detail-body"></div>
  </div>

</main>

<script src="js/helpers.js"></script>
<script src="js/supabase.js"></script>
<script src="js/components.js"></script>
<script>
let allDeals = [];

function populateFilters() {
  const seasons = [...new Set(allDeals.map(d => d.season))].sort((a,b) => a-b);
  const sel = document.getElementById('filter-season');
  seasons.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = 'Sæson ' + s;
    sel.appendChild(opt);
  });
}

function getFilteredCompanies() {
  const season = document.getElementById('filter-season').value;
  const status = document.getElementById('filter-status').value;
  const search = document.getElementById('filter-search').value.toLowerCase();

  const byName = {};
  allDeals.forEach(d => {
    if (!byName[d.name]) byName[d.name] = [];
    byName[d.name].push(d);
  });

  return Object.entries(byName).filter(([name, deals]) => {
    if (season && !deals.some(d => d.season == season)) return false;
    if (status && !deals.some(d => (d.status || '').toLowerCase() === status.toLowerCase())) return false;
    if (search && !name.toLowerCase().includes(search)) return false;
    return true;
  });
}

function renderGrid() {
  // Kort-markup ejes af renderCompanyCard() i components.js — ren komposition her
  const companies = getFilteredCompanies();
  document.getElementById('co-grid').innerHTML =
    companies.map(([name, deals]) => renderCompanyCard(name, deals)).join('');
  document.getElementById('co-count').textContent = `Viser ${companies.length} virksomheder`;
}

// Event-wiring — ingen inline handlers i markup
document.getElementById('filter-season').addEventListener('change', renderGrid);
document.getElementById('filter-status').addEventListener('change', renderGrid);
document.getElementById('filter-search').addEventListener('input', renderGrid);

document.getElementById('co-grid').addEventListener('click', e => {
  const card = e.target.closest('.co-card');
  if (card) showDetail(card.dataset.name);
});
document.getElementById('co-grid').addEventListener('keydown', e => {
  if (e.key !== 'Enter') return;
  const card = e.target.closest('.co-card');
  if (card) showDetail(card.dataset.name);
});

document.getElementById('back-btn').addEventListener('click', e => {
  e.preventDefault();
  showGrid();
});

function showDetail(name, push = true) {
  // Profilen er et mini-dashboard — markup ejes af renderCompanyProfile() i components.js
  const p = buildCompanyProfile(name, allDeals);
  if (!p) { showGrid(push); return; }

  document.getElementById('grid-view').style.display = 'none';
  document.getElementById('detail-view').style.display = 'block';
  document.getElementById('detail-body').innerHTML = renderCompanyProfile(p);
  window.scrollTo({ top: 0, behavior: 'instant' });

  if (push) window.history.pushState({}, '', '?name=' + encodeURIComponent(name));
}

// Exploration loops i profilen: relateret virksomhed → dens profil (samme side),
// investor-chip → investorprofilen
document.getElementById('detail-body').addEventListener('click', e => {
  const rel = e.target.closest('.related-chip');
  if (rel) { showDetail(rel.dataset.name); return; }
  const inv = e.target.closest('.partner-chip');
  if (inv) window.location = 'investors.html?name=' + encodeURIComponent(inv.dataset.name);
});

function showGrid(push = true) {
  document.getElementById('grid-view').style.display = 'block';
  document.getElementById('detail-view').style.display = 'none';
  if (push) window.history.pushState({}, '', 'companies.html');
}

// Tilbage/frem-knapper: vis den visning URL'en peger på, uden at skubbe ny historik
window.addEventListener('popstate', () => {
  const name = new URLSearchParams(window.location.search).get('name');
  if (name) showDetail(name, false);
  else showGrid(false);
});

async function init() {
  document.getElementById('co-grid').innerHTML = renderSkeletonCards(12);
  allDeals = await loadDeals();
  renderHeaderStats(allDeals);
  populateFilters();
  renderGrid();

  // Åbn direkte hvis URL har ?name= (params.get dekoder selv — ingen ekstra decode)
  const params = new URLSearchParams(window.location.search);
  if (params.get('name')) {
    showDetail(params.get('name'), false);
  }
}

init().catch(err => { console.error(err); showLoadError(); });
</script>
</body>
</html>
