<!DOCTYPE html>
<html lang="da">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deals — Hulens Data</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script src="js/layout.js"></script>
</head>
<body>

<header class="site-header"></header>
<script>renderSiteHeader('deals');</script>

<main class="page-main">
  <h1 class="page-title">Alle <span>deals</span></h1>

  <div class="filters">
    <label>Sæson</label>
    <select id="filter-season">
      <option value="">Alle</option>
    </select>
    <label>Investor</label>
    <select id="filter-investor">
      <option value="">Alle</option>
    </select>
    <input type="text" id="filter-search" placeholder="Søg virksomhed…" style="min-width:160px">
  </div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th data-sort="name">Virksomhed <span class="sort-icon">↕</span></th>
          <th data-sort="season">Sæson <span class="sort-icon">↕</span></th>
          <th data-sort="asked" class="num">Søger <span class="sort-icon">↕</span></th>
          <th data-sort="shareOffered" class="num col-secondary">Tilbudt andel <span class="sort-icon">↕</span></th>
          <th data-sort="valBefore" class="num col-secondary">Val. før <span class="sort-icon">↕</span></th>
          <th data-sort="received" class="num">Modtaget <span class="sort-icon">↕</span></th>
          <th data-sort="shareSold" class="num col-secondary">Solgt andel <span class="sort-icon">↕</span></th>
          <th data-sort="valAfter" class="num col-secondary">Val. efter <span class="sort-icon">↕</span></th>
          <th class="num col-secondary">Ændring</th>
          <th>Investorer</th>
        </tr>
      </thead>
      <tbody id="deals-tbody"></tbody>
    </table>
  </div>
  <p class="table-count" id="table-count"></p>
</main>

<script src="js/helpers.js"></script>
<script src="js/supabase.js"></script>
<script src="js/components.js"></script>
<script>
let allDeals = [];
let sortKey = 'season';
let sortDir = 1;

function populateFilters() {
  const seasons = [...new Set(allDeals.map(d => d.season))].sort((a,b) => a-b);
  const sel = document.getElementById('filter-season');
  seasons.forEach(s => {
    const opt = document.createElement('option');
    opt.value = s; opt.textContent = 'Sæson ' + s;
    sel.appendChild(opt);
  });

  const investors = [...new Set(allDeals.flatMap(d => d.investorList))].sort();
  const isel = document.getElementById('filter-investor');
  investors.forEach(inv => {
    const opt = document.createElement('option');
    opt.value = inv; opt.textContent = inv;
    isel.appendChild(opt);
  });
}

function getFiltered() {
  const season   = document.getElementById('filter-season').value;
  const investor = document.getElementById('filter-investor').value;
  const search   = document.getElementById('filter-search').value.toLowerCase();

  return allDeals.filter(d => {
    if (season   && d.season != season) return false;
    if (investor && !d.investorList.includes(investor)) return false;
    if (search   && !d.name.toLowerCase().includes(search)) return false;
    return true;
  });
}

function sortBy(key) {
  if (sortKey === key) sortDir *= -1;
  else { sortKey = key; sortDir = 1; }
  renderTable();
}

function renderTable() {
  const data = getFiltered().sort((a, b) => {
    let av = a[sortKey], bv = b[sortKey];
    if (av == null) av = -Infinity;
    if (bv == null) bv = -Infinity;
    if (typeof av === 'string') return av.localeCompare(bv) * sortDir;
    return (av - bv) * sortDir;
  });

  document.getElementById('deals-tbody').innerHTML = data.length === 0
    ? '<tr><td colspan="10" class="empty">Ingen deals matcher filteret</td></tr>'
    : data.map(renderDealRow).join('');

  // Markér aktiv sorteringskolonne (guld sort-ikon via thead th.sorted i style.css)
  document.querySelectorAll('thead th[data-sort]').forEach(th =>
    th.classList.toggle('sorted', th.dataset.sort === sortKey));

  document.getElementById('table-count').textContent = `Viser ${data.length} af ${allDeals.length} deals`;
}

// Event-wiring — ingen inline handlers i markup
document.getElementById('filter-season').addEventListener('change', renderTable);
document.getElementById('filter-investor').addEventListener('change', renderTable);
document.getElementById('filter-search').addEventListener('input', renderTable);

document.querySelector('thead').addEventListener('click', e => {
  const th = e.target.closest('th[data-sort]');
  if (th) sortBy(th.dataset.sort);
});

document.getElementById('deals-tbody').addEventListener('click', e => {
  const el = e.target.closest('.company-name');
  if (el) window.location = companyUrl(el.dataset.company);
});

async function init() {
  document.getElementById('deals-tbody').innerHTML = renderSkeletonRows(8, 10);
  allDeals = await loadDeals();
  renderHeaderStats(allDeals);
  populateFilters();
  renderTable();
}

init().catch(err => { console.error(err); showLoadError(); });
</script>
</body>
</html>
